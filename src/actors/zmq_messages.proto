syntax = "proto3";

// Protocol Buffer definitions for FUSE <-> GSLite/GSEvolve ZMQ communication.
// Share this file with the GSLite team to generate C++ code.
//
// Julia (run from repo root):
//   julia --project -e 'using ProtoBuf; ProtoBuf.protojl("zmq_messages.proto", joinpath(@__DIR__, "src/actors"), joinpath(@__DIR__, "src/actors/zmq_proto_generated"); always_use_modules=true)'
// Generated stub: src/actors/zmq_proto_generated/zmq_messages_pb.jl (ProtoBuf.jl v1.3.0 — must match)
// C++:    protoc --cpp_out=. zmq_messages.proto

// Sent by FUSE to initiate each exchange
message FUSERequest {
    string status = 1;                    // "ready", "handshake"
    double time = 2;                      // FUSE simulation time [s]
}

// Sent by GSLite in response to FUSERequest with status="ready"
//
// Presence semantics for singular scalars:
//   Proto3 elides zero-valued singular scalars on the wire, so there is no way
//   to tell "sent 0.0" from "not sent" for plain fields. The four scalars that
//   can legitimately be zero during a shot (ramp-up / diagnostic) are marked
//   `optional` so absence and explicit zero are distinguishable. GSLite MUST
//   set these fields on every message where the value is meaningful; omitting
//   a field means "not measured this step," NOT "zero."
//   Requires protoc >= 3.15.
message DataForFUSE {
    double sim_time = 1;                    // GSLite simulation time [s]
    bool   done = 2;                        // true on last time step
    optional double Ip_latest = 3;          // latest Ip measurement [A], absent = not measured
    optional double Ip_avg = 4;             // average Ip measurement [A], absent = not measured
    optional double Bt = 5;                 // vacuum toroidal field at R0 [T]; send on first message and any time it changes
    optional double pr15v = 6;              // PR15V Ip measurement [A], absent = not measured
    repeated double I_coil = 7;             // PF coil currents [A]
    repeated double psizr = 8;              // flat flux matrix psi(R,Z) [Wb/rad], R-fast
    repeated double r_grid = 9;             // R grid points [m]
    repeated double z_grid = 10;            // Z grid points [m]
    repeated double pinj_per_beam = 11;     // NBI injected power per beam [W]
    repeated double nbi_acc_voltage = 12;   // NBI acceleration voltage per beam [eV]
    repeated double gas_cal = 13;           // gas calibration values
}

// Sent by FUSE after completing a time step
message DataFromFUSE {
    double sim_time = 1;                  // current simulation time [s]
    bool   valid = 2;                     // false on first send
    double betap = 3;                     // poloidal beta
    double betap_dot = 4;                 // time derivative of beta_pol [1/s]
    double li = 5;                        // internal inductance (li_1)
    double li_dot = 6;                    // time derivative of li_1 [1/s]
    double p_res = 7;                     // plasma resistance [Ohm]
    repeated double dens_co2_sig = 8;     // CO2 line-integrated density [m^-2]
}

// Sent by GSLite as acknowledgment.
// GSLite MUST set ok=true on accepted steps. Set ok=false with a human-readable
// `error` to signal rejection (NaN/out-of-range input, solver divergence,
// time-desync, etc.); FUSE treats a falsy ok as a fatal coupled-run error.
// `status` is kept for legacy GSLite builds that only populate the string field.
message Ack {
    string status = 1;                    // legacy: "ack" or ""
    bool   ok     = 2;                    // false => GSLite rejected/errored
    string error  = 3;                    // human-readable reason when !ok
}
