# Optional conda environment for Jupyter + WebIO when your system Python
# does not already provide a compatible JupyterLab install.
#
# Create and activate:
#   conda env create -f docs/jupyter_environment.yml
#   conda activate fuse
#
# Then run `fusebot install_IJulia` (or `make install_IJulia` from the FUSE repo).

name: fuse
channels:
  - conda-forge
dependencies:
  - python>=3.10,<3.13
  - jupyterlab>=3.6,<4
  - notebook>=6.5,<7
  - ipykernel
  - pip
  - pip:
      - webio_jupyter_extension
