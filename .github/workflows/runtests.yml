name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ["1.11"]
        os: [ubuntu-latest, macos-latest]
    env:
      GKSwstype: "100" # headless Plots.jl
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      # The FuseRegistry lists packages via git@ SSH URLs; route GitHub over HTTPS so the public
      # repos clone without SSH keys or a token. (Any private deps simply won't resolve — and a
      # public FUSE shouldn't depend on private packages anyway.)
      - name: Add FuseRegistry (public, over HTTPS)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          julia --color=yes -e 'using Pkg; Pkg.Registry.add(RegistrySpec(url="https://github.com/ProjectTorreyPines/FuseRegistry.jl.git")); Pkg.Registry.add("General"); Pkg.Registry.update()'

      # Always test against the FORK versions of IMAS/EPEDNN — their additions (e.g.
      # IMAS.pedestal_poloidal_beta, EPEDNN.ensemble_uncertainty) are not in the registry. dev the
      # forks, instantiate (rest resolves from FuseRegistry), and run the tests in the SAME session
      # so Pkg.test() inherits the dev'd paths and can never fall back to the registry versions.
      - name: Test (fork IMAS_Design / EPEDNN_Design)
        run: |
          julia --project=. --color=yes -e '
            using Pkg
            Pkg.develop([
                PackageSpec(url="https://github.com/TimSlendebroek/IMAS_Design.jl.git"),
                PackageSpec(url="https://github.com/TimSlendebroek/EPEDNN_Design.jl.git"),
            ])
            Pkg.instantiate()
            Pkg.test()'
