name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PTP_READ_TOKEN: ${{ secrets.PTP_READ_TOKEN }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ["1.11"]
        os: [ubuntu-latest, macos-latest]
    env:
      GKSwstype: "100" # headless Plots.jl
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      # FUSE pulls private ProjectTorreyPines packages from the FuseRegistry, which references them
      # via git@ SSH; rewrite to HTTPS + PTP_READ_TOKEN so CI can fetch them.
      - name: Add FuseRegistry
        run: |
          julia --color=yes -e 'using Pkg; Pkg.Registry.add(RegistrySpec(url="https://github.com/ProjectTorreyPines/FuseRegistry.jl.git")); Pkg.Registry.add("General"); Pkg.Registry.update()'
          find ~/.julia/registries/FuseRegistry -type f -name 'Package.toml' \
            -exec perl -pi -e 's{git\@github\.com:}{https://project-torrey-pines:${{ secrets.PTP_READ_TOKEN }}\@github.com/}g' {} +

      # dev the local package + Tim's IMAS_Design/EPEDNN_Design forks (their additions — e.g.
      # IMAS.pedestal_poloidal_beta, EPEDNN.ensemble_uncertainty — are not in the registry), then
      # resolve everything else from the FuseRegistry.
      - name: Instantiate (dev forks)
        run: |
          julia --project=. --color=yes -e '
            using Pkg
            Pkg.develop([
                PackageSpec(url="https://github.com/TimSlendebroek/IMAS_Design.jl.git"),
                PackageSpec(url="https://github.com/TimSlendebroek/EPEDNN_Design.jl.git"),
            ])
            Pkg.instantiate()'

      - uses: julia-actions/julia-runtest@v1
